services:
  - type: web
    name: air-pollution-survey-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: air-pollution-survey-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_FRONTEND_URL
        sync: false
      - key: JPA_DDL_AUTO
        value: update
      - key: SEED_DEMO_USERS
        value: false

databases:
  - name: air-pollution-survey-db
    plan: free
