server.port=${PORT:8080}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/air_pollution_survey}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-long-random-production-value-123456}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}
app.seed-demo-users=${SEED_DEMO_USERS:true}
